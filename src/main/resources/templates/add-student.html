<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Додати</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">

<h2>Додати студента</h2>

<form th:action="@{/students/add}" th:object="${student}" method="post">

    <input class="form-control" placeholder="Ім'я" th:field="*{name}">
    <div class="text-danger" th:errors="*{name}"></div>

    <input class="form-control mt-2" type="number" th:field="*{age}">
    <div class="text-danger" th:errors="*{age}"></div>

    <input class="form-control mt-2" type="email" th:field="*{email}">
    <div class="text-danger" th:errors="*{email}"></div>

    <button class="btn btn-success mt-3">Зберегти</button>
</form>

</body>
</html>
