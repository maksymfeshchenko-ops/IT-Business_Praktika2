<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">

<h2>Список студентів</h2>

<form action="/students/search" method="get" class="mb-3">
    <input name="name" placeholder="Ім'я">
    <input name="email" placeholder="Email">
    <input name="id" placeholder="ID">
    <button class="btn btn-primary">Пошук</button>
</form>

<a href="/students/add" class="btn btn-success mb-2">Додати</a>

<table class="table table-striped">
    <tr>
        <th>ID</th>
        <th>Ім'я</th>
        <th>Вік</th>
        <th>Email</th>
        <th>Дії</th>
    </tr>

    <tr th:each="student, iter : ${students}">
        <td th:text="${iter.index}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.age}"></td>
        <td th:text="${student.email}"></td>
        <td>
            <a th:href="@{'/students/' + ${iter.index}}" class="btn btn-info btn-sm">Деталі</a>
        </td>
    </tr>
</table>

</body>
</html>
